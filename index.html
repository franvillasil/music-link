<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="Paste a music link and open the same song in Spotify, Apple Music, TIDAL, YouTube Music, Deezer, or Amazon Music."
    />
    <meta name="theme-color" content="#070810" />
    <title>Music Link — any song, every platform</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css?v=20260704-4" />
  </head>
  <body>
    <div class="glow glow--one" aria-hidden="true"></div>
    <div class="glow glow--two" aria-hidden="true"></div>
    <div class="glow glow--three" aria-hidden="true"></div>

    <main class="shell">
      <header class="brand">
        <div class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M9 18.5a3 3 0 1 1-2-2.83V6.2a1 1 0 0 1 .76-.97l9-2.2A1 1 0 0 1 18 4v10.67a3 3 0 1 1-2-2.83V7.05l-7 1.71z" />
          </svg>
        </div>
        <h1 class="brand__name">Music<span>Link</span></h1>
        <p class="brand__tagline">Any song. Every platform.</p>
      </header>

      <section class="tool" aria-label="Music link converter">
        <form class="resolver" id="resolver-form">
          <div class="input-wrap">
            <svg class="input-wrap__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
            </svg>
            <input
              id="music-url"
              name="url"
              type="text"
              inputmode="url"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
              placeholder="Paste a song link…"
              aria-label="Music link"
              required
            />
            <button class="paste-button" id="paste-button" type="button" aria-label="Paste from clipboard">
              Paste
            </button>
          </div>

          <button class="button button--primary" id="resolve-button" type="submit">
            <span class="button__label">Find song</span>
          </button>
        </form>

        <p class="hint">Works with Spotify, Apple Music, TIDAL, YouTube Music, Deezer &amp; Amazon Music links.</p>

        <div class="loader" id="loader" hidden aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
        </div>

        <p class="status" id="status" role="status" aria-live="polite"></p>

        <article class="result" id="result" hidden>
          <div class="result__artwork-wrap">
            <img class="result__artwork" id="result-artwork" alt="" />
          </div>
          <div class="result__meta">
            <span class="result__badge" id="result-source"></span>
            <h2 id="result-title"></h2>
            <p id="result-artist"></p>
          </div>
        </article>

        <section class="links" id="links" aria-label="Available platforms"></section>

        <section class="share" id="share" hidden>
          <span class="share__label">Share this converter link</span>
          <div class="copy-row">
            <input id="share-url" type="text" readonly />
            <button class="button button--secondary" id="copy-share-url" type="button">
              Copy
            </button>
          </div>
        </section>
      </section>

      <footer class="footer">
        <p>Matches powered by <a href="https://odesli.co" target="_blank" rel="noopener noreferrer">Odesli</a></p>
      </footer>
    </main>

    <script src="./config.js?v=20260704-4"></script>
    <script src="./dist/app.js?v=20260704-4" defer></script>
  </body>
</html>
